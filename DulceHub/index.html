<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DulceHub</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <header class="header">
        <div class="logo">DulceHub</div>
    </header>

    <button id="themeToggle">Dark mode</button>

    <div class="container">
        <h1>Dessert finder</h1>

        <input type="text" id="dessertInput" placeholder="Ex: brownie, cheesecake...">
        <button id="searchBtn">Search recipe</button>

        <div id="result"></div>

        <p class="intro">
            Discover the best desserts in the world. Search for your favorite or get inspired by our recommendations.
        </p>

        <div class="highlights">
            <div>Recommended: Strawberry cake</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
